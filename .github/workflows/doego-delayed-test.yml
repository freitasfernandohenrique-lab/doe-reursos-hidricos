name: DOE-GO Delayed Test

on:
  workflow_dispatch:
    inputs:
      delay_minutes:
        description: "Minutos de espera antes do teste"
        required: true
        default: "10"
      force_send:
        description: "Forçar envio no teste"
        required: true
        default: "true"

jobs:
  delayed-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait before run
        run: sleep $(( ${{ github.event.inputs.delay_minutes }} * 60 ))

      - name: Run monitor test
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SENT_LOG_PATH: .state/sent_log.json
          OUTPUT_DIR: outputs
          ENABLE_PDF_FALLBACK: "false"
          FORCE_SEND: ${{ github.event.inputs.force_send }}
        run: python -m src.main