name: DOE-GO Email Monitor

on:
  schedule:
    - cron: "30 11 * * *" # 08:30 America/Sao_Paulo (principal)
    - cron: "55 11 * * *" # 08:55 America/Sao_Paulo (backup)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore sent log cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .state/sent_log.json
          key: doego-sent-log-${{ github.run_id }}
          restore-keys: |
            doego-sent-log-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SENT_LOG_PATH: .state/sent_log.json
          OUTPUT_DIR: outputs
          ENABLE_PDF_FALLBACK: "false"
          FORCE_SEND: "false"
        run: |
          for i in 1 2 3; do
            python -m src.main && break
            if [ "$i" -eq 3 ]; then
              echo "Monitor falhou apos 3 tentativas."
              exit 1
            fi
            echo "Tentativa $i falhou, aguardando 30s para retry..."
            sleep 30
          done

      - name: Generate demo email artifact
        run: |
          python -m src.main --demo

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: doego-monitor-${{ github.run_id }}
          path: |
            outputs/
            .state/sent_log.json
          if-no-files-found: warn

      - name: Save sent log cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .state/sent_log.json
          key: doego-sent-log-${{ github.run_id }}